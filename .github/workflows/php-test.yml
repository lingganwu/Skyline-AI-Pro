name: Skyline AI Plugin CI/CD Test
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: PHP 8.1 Setup
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, phpunit
          
      - name: Validate Composer
        run: composer validate --no-check-all --no-check-publish
        
      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
        
      - name: Run Code Analysis
        run: |
          vendor/bin/phpcs --standard=WordPress --extensions=php --ignore=*/vendor/*,*/node_modules/* . || echo "Code analysis completed with warnings"
          
      - name: Generate Package
        run: |
          mkdir -p build/skyline-ai-pro
          rsync -rc --exclude-from=.gitignore --exclude=.git --exclude=.github --exclude=build --exclude=vendor --exclude=node_modules ./ build/skyline-ai-pro/
          cd build/skyline-ai-pro && zip -r ../skyline-ai-pro.zip .
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: skyline-ai-pro
          path: build/skyline-ai-pro.zip
          retention-days: 7
