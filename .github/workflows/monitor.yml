name: 🔧 Auto-Heal CI

on:
  schedule:
    - cron: '0 */10 * * *'  # Every 10 minutes
  workflow_dispatch:

jobs:
  monitor-and-heal:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO_NAME: ${{ github.repository }}

    steps:
      - name: 📊 Fetch recent workflow runs
        id: fetch_runs
        run: |
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN"             "https://api.github.com/repos/$REPO_NAME/actions/runs?per_page=5&status=completed")
          echo "response<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🐞 Parse failed runs
        id: parse_failed
        run: |
          # Extract failed run IDs
          FAILED_IDS=$(echo "$response" | jq -r '.workflow_runs[] | select(.conclusion=="failure" or .conclusion=="cancelled") | .id' | tr '\n' ' ')
          echo "failed_ids=$FAILED_IDS" >> $GITHUB_OUTPUT

      - name: ♻️ Retry failed workflows
        if: env.failed_ids != ''
        run: |
          for ID in $failed_ids; do
            echo "🔁 Retrying run $ID"
            curl -s -X POST               -H "Authorization: token $GITHUB_TOKEN"               "https://api.github.com/repos/$REPO_NAME/actions/runs/$ID/rerun"               -o /dev/null
          done

      - name: 📝 Create issue for manual check if needed
        if: env.failed_ids != ''
        uses: actions/github-script@v6
        with:
          script: |
            const failedIds = process.env.failed_ids.split(' ').filter(Boolean);
            if (failedIds.length > 0) {
              const issueTitle = `⚠️ Auto-Heal CI: ${failedIds.length} workflow(s) failed`;
              const issueBody = `The following workflow runs failed and were automatically retried:\n${failedIds.map(id => `- https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${id}`).join('\n')}`;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody
              });
            }
